name: Release and publish

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing release tag to rebuild and publish
        required: true
        type: string

concurrency:
  group: release-main
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  quality:
    name: Test, lint, and build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --dev

      - name: Run tests
        run: uv run pytest

      - name: Run lint
        run: uv run ruff check .

      - name: Build package
        run: uv build

      - name: Store release distributions
        uses: actions/upload-artifact@v7
        with:
          name: release-distributions
          path: dist/
          if-no-files-found: error

  release:
    name: Prepare or create release
    needs: quality
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}

    steps:
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@v5
        with:
          release-type: python
          target-branch: main

  publish:
    name: Publish release artifacts
    needs:
      - quality
      - release
    if: ${{ needs.release.outputs.release_created == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download release distributions
        uses: actions/download-artifact@v8
        with:
          name: release-distributions
          path: dist/

      - name: Attach distributions to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ inputs.release_tag || needs.release.outputs.tag_name }}
        run: gh release upload "$RELEASE_TAG" dist/* --clobber

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
